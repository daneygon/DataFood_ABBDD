# ================================================
# DataFood Backend ? application.properties
# ================================================

spring.application.name=DataFood_BackEnd

# ?? SQL Server con usuario y contraseña (SQL Authentication) ????
# CAMBIO: quitamos integratedSecurity=true y usamos sa o tu usuario
spring.datasource.url=jdbc:sqlserver://Gamaliel;databaseName=DATAFOOD;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=TuPassword123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ?? JPA / Hibernate ?????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# No necesitas especificar el dialecto, Hibernate lo detecta solo
# spring.jpa.properties.hibernate.dialect=...

# ?? Deshabilitar Spring Security (para desarrollo) ??????????????
# Esto evita que pida login en cada request
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ?? Server ??????????????????????????????????????????????????????
server.port=8080

# ?? Logging ?????????????????????????????????????????????????????
logging.level.com.datafood_backend=DEBUG
